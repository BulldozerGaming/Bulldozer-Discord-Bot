<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="theme-color" content="#080b0d">
  <title>Privacy Policy | Bulldozer Discord Bot</title>
  <meta
    id="metaDescription"
    name="description"
    content="How the Bulldozer Discord Bot handles and protects information required for its operation."
  >

  <style>
    :root{
      --bg:#060809;
      --panel:rgba(13,17,20,.94);
      --gold:#ffb81f;
      --gold2:#ffd160;
      --text:#f4f6f7;
      --muted:#a8afb4;
      --shadow:0 24px 80px rgba(0,0,0,.48);
      --max:980px
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}

    body{
      min-height:100vh;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      line-height:1.75;
      background:
        linear-gradient(rgba(6,9,11,.86),rgba(7,10,12,.96)),
        url("assets/stone-texture.webp") center/1100px auto repeat
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 20% 0%,rgba(255,184,31,.08),transparent 28%),
        radial-gradient(circle at 85% 12%,rgba(255,98,0,.05),transparent 25%),
        linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
      background-size:auto,auto,42px 42px,42px 42px;
      z-index:-1
    }

    a{color:inherit;text-decoration:none}

    .site-header{
      position:sticky;
      top:0;
      z-index:100;
      border-bottom:1px solid rgba(255,184,31,.18);
      background:rgba(5,8,10,.88);
      backdrop-filter:blur(16px);
      box-shadow:0 14px 34px rgba(0,0,0,.28)
    }

    .nav-wrap{
      width:min(1180px,calc(100% - 32px));
      min-height:78px;
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px
    }

    .brand{display:inline-flex;align-items:center;gap:13px}
    .brand-mark{
      width:48px;
      height:54px;
      display:grid;
      place-items:center;
      color:var(--gold);
      filter:drop-shadow(0 0 20px rgba(255,184,31,.22))
    }

    .brand-mark svg{width:100%;height:100%}

    .brand-text strong{
      display:block;
      color:var(--gold);
      font-size:1.08rem;
      line-height:1;
      letter-spacing:.07em
    }

    .brand-text span{
      display:block;
      margin-top:7px;
      color:#d2a63b;
      font-size:.67rem;
      font-weight:800;
      letter-spacing:.31em
    }

    .header-actions{
      display:flex;
      align-items:center;
      gap:10px
    }

    .language-switch{
      display:flex;
      padding:3px;
      border:1px solid rgba(255,184,31,.28);
      border-radius:7px;
      background:rgba(255,184,31,.04)
    }

    .language-button{
      min-width:42px;
      height:36px;
      border:0;
      border-radius:5px;
      color:var(--muted);
      background:transparent;
      font:inherit;
      font-size:.75rem;
      font-weight:850;
      cursor:pointer;
      transition:.2s
    }

    .language-button:hover,
    .language-button.active{
      color:#090b0c;
      background:var(--gold)
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:9px;
      min-height:44px;
      padding:0 16px;
      color:var(--gold);
      font-size:.82rem;
      font-weight:850;
      letter-spacing:.04em;
      text-transform:uppercase;
      border:1px solid rgba(255,184,31,.55);
      border-radius:7px;
      transition:.2s
    }

    .back-link:hover{
      transform:translateY(-2px);
      background:rgba(255,184,31,.08);
      box-shadow:0 12px 26px rgba(255,184,31,.12)
    }

    .hero{
      position:relative;
      padding:82px 0 44px;
      text-align:center;
      overflow:hidden
    }

    .hero:before{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at 50% 20%,rgba(255,184,31,.10),transparent 35%);
      pointer-events:none
    }

    .hero-inner{
      position:relative;
      width:min(var(--max),calc(100% - 32px));
      margin:auto
    }

    .kicker{
      display:inline-flex;
      align-items:center;
      gap:10px;
      color:var(--gold);
      font-size:.76rem;
      font-weight:850;
      letter-spacing:.15em;
      text-transform:uppercase
    }

    .kicker:before,.kicker:after{
      content:"";
      width:34px;
      height:1px;
      background:linear-gradient(90deg,transparent,var(--gold))
    }

    .kicker:after{background:linear-gradient(90deg,var(--gold),transparent)}

    h1{
      margin-top:18px;
      font-size:clamp(2.4rem,6vw,4.8rem);
      line-height:1.05;
      letter-spacing:-.035em;
      text-transform:uppercase;
      background:linear-gradient(180deg,#fff 0%,#c4c9cc 55%,#fff 75%,#8d9499 100%);
      background-clip:text;
      -webkit-background-clip:text;
      color:transparent;
      filter:drop-shadow(0 7px 20px rgba(0,0,0,.45))
    }

    .hero p{
      max-width:720px;
      margin:20px auto 0;
      color:var(--muted);
      font-size:1.02rem
    }

    .updated{
      display:inline-block;
      margin-top:18px;
      padding:7px 12px;
      border:1px solid rgba(255,184,31,.26);
      border-radius:999px;
      color:var(--gold2);
      background:rgba(8,11,13,.62);
      font-size:.78rem;
      font-weight:750
    }

    .page-wrap{
      width:min(var(--max),calc(100% - 32px));
      margin:auto;
      padding:0 0 80px
    }

    .policy-card{
      padding:clamp(26px,4vw,46px);
      border:1px solid rgba(255,255,255,.11);
      border-radius:16px;
      background:linear-gradient(180deg,rgba(255,255,255,.025),transparent),var(--panel);
      box-shadow:var(--shadow)
    }

    .policy-section+.policy-section{
      margin-top:34px;
      padding-top:34px;
      border-top:1px solid rgba(255,255,255,.09)
    }

    h2{
      color:var(--gold);
      font-size:clamp(1.25rem,2.2vw,1.65rem);
      line-height:1.3;
      margin-bottom:12px
    }

    p,li{color:#d5dadd}
    ul{margin-top:12px;padding-left:22px}
    li+li{margin-top:7px}

    .note{
      margin-top:18px;
      padding:16px 18px;
      border-left:3px solid var(--gold);
      border-radius:8px;
      background:rgba(255,184,31,.06);
      color:#e5e8ea
    }

    .contact-box{
      margin-top:16px;
      padding:18px;
      border:1px solid rgba(255,184,31,.22);
      border-radius:10px;
      background:rgba(255,184,31,.05)
    }

    .contact-box a{color:var(--gold2);font-weight:800}

    .site-footer{
      border-top:1px solid rgba(255,184,31,.16);
      padding:26px 16px;
      text-align:center;
      color:#7f878d;
      font-size:.82rem;
      background:rgba(5,8,10,.72)
    }


    .cta-wrap{padding:0 0 88px;background:#090c0e}.cta-container{width:min(1180px,calc(100% - 32px));margin:auto}.cta-banner{min-height:210px;border:1px solid rgba(255,184,31,.62);border-radius:10px;background:linear-gradient(90deg,rgba(7,9,10,.78),rgba(7,9,10,.92),rgba(7,9,10,.78)),url("assets/cta-castle.webp") center/cover no-repeat;display:grid;place-items:center;text-align:center;box-shadow:var(--shadow);overflow:hidden;position:relative}.cta-banner:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,184,31,.08),transparent 25%,transparent 75%,rgba(255,184,31,.08)),linear-gradient(180deg,transparent,rgba(0,0,0,.18))}.cta-content{padding:28px;position:relative;z-index:1}.cta-content h2{color:#fff;font-size:clamp(1.6rem,3vw,2.4rem);line-height:1.2;margin-bottom:7px}.cta-content p{color:#d3d7da;margin-bottom:22px}.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:10px;min-height:48px;padding:0 20px;border:1px solid #ffcb43;border-radius:6px;color:#07090a;background:linear-gradient(180deg,#ffc73a 0%,#e7a60b 100%);box-shadow:0 16px 35px rgba(255,184,31,.18);font-weight:850;letter-spacing:.02em;text-transform:uppercase;transition:.2s}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 20px 45px rgba(255,184,31,.28);background:linear-gradient(180deg,#ffd15a 0%,#efae11 100%)}

    .site-footer {
      padding: 48px 0 22px;
      background:
        linear-gradient(rgba(7,9,10,0.82), rgba(7,9,10,0.94)),
        url("assets/stone-texture.webp") center / 1100px auto repeat;
      border-top: 0;
      text-align: left;
      color: inherit;
      font-size: inherit;
    }

    .footer-container {
      width: min(1180px, calc(100% - 36px));
      margin-inline: auto;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.45fr 1fr 1fr;
      gap: 42px;
      padding-bottom: 34px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }

    .footer-brand p {
      margin-top: 16px;
      max-width: 310px;
      color: var(--muted);
    }

    .footer-col h4 {
      color: #f5f5f5;
      margin-bottom: 14px;
      font-size: 0.92rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .footer-col a {
      display: block;
      color: var(--muted);
      margin: 8px 0;
      transition: color 0.2s ease;
    }

    .footer-col a:hover {
      color: var(--gold);
    }

    .footer-bottom {
      text-align: center;
      color: #7f878d;
      font-size: 0.82rem;
      padding-top: 20px;
    }

@media(max-width:700px){
      .nav-wrap{width:min(100% - 22px,1180px)}
      .brand-text strong{font-size:.94rem}
      .brand-text span{font-size:.58rem;letter-spacing:.24em}
      .brand-mark{width:42px;height:48px}
      .back-link{padding:0 11px;font-size:.70rem}
      .hero{padding-top:58px}
      .policy-card{border-radius:12px}.footer-grid{grid-template-columns:1fr}.footer-container{width:min(1180px,calc(100% - 24px))}.cta-wrap{padding-bottom:56px}
    }

    @media(max-width:540px){
      .back-link span{display:none}
      .back-link{width:44px;padding:0;justify-content:center}
      .language-button{min-width:37px}
    }
  </style>
</head>

              Az adatokat csak addig őrizzük meg, ameddig azok a bot működéséhez szükségesek.
              A szerver adminisztrátorai a fejlesztővel történő kapcsolatfelvétellel kérhetik a
              szerverhez kapcsolódó tárolt adatok törlését.
            </p>
          </section>

          <section class="policy-section">
            <h2>Az irányelvek módosítása</h2>
            <p>
              Az adatvédelmi irányelvek a bot funkcióinak vagy adatkezelési gyakorlatának változásakor
              frissülhetnek. A legújabb változat mindig ezen az oldalon lesz elérhető.
            </p>
          </section>

          <section class="policy-section">
            <h2>Kapcsolat</h2>
            <div class="contact-box">

              a fejlesztővel:
              <a href="mailto:csutora8@gmail.com">csutora8@gmail.com</a>.

        `
      }
    };

    function detectLanguage() {
      const savedLanguage = localStorage.getItem("bulldozer-language");

      if (savedLanguage === "hu" || savedLanguage === "en") {
        return savedLanguage;
      }

      const browserLanguages = navigator.languages?.length
        ? navigator.languages
        : [navigator.language || "en"];

      return browserLanguages.some((language) =>
        String(language).toLowerCase().startsWith("hu")
      )
        ? "hu"
        : "en";
    }

    function applyLanguage(language, savePreference = false) {
      const selectedLanguage = translations[language] ? language : "en";
      const text = translations[selectedLanguage];

      document.documentElement.lang = text.htmlLang;
      document.title = text.documentTitle;
      document.getElementById("metaDescription").content = text.metaDescription;
      document.getElementById("brandLink").setAttribute("aria-label", text.brandAria);
      document.getElementById("backText").textContent = text.back;
      document.getElementById("kicker").textContent = text.kicker;
      document.getElementById("pageTitle").textContent = text.title;
      document.getElementById("heroDescription").textContent = text.description;
      document.getElementById("updated").textContent = text.updated;
      document.getElementById("policyContent").innerHTML = text.content;
      document.getElementById("footerRights").textContent = text.rights;
      document.getElementById("ctaTitle").textContent = text.ctaTitle;
      document.getElementById("ctaText").textContent = text.ctaText;
      document.getElementById("ctaButton").textContent = text.ctaButton;
      document.getElementById("footerTagline").textContent = text.footerTagline;
      document.getElementById("footerDocsTitle").textContent = text.footerDocsTitle;
      document.getElementById("footerGuide").textContent = text.footerGuide;
      document.getElementById("footerLegalTitle").textContent = text.footerLegalTitle;
      document.getElementById("footerPrivacy").textContent = text.footerPrivacy;
      document.getElementById("footerTerms").textContent = text.footerTerms;

      document.querySelectorAll(".language-button").forEach((button) => {
        const isActive = button.dataset.language === selectedLanguage;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      if (savePreference) {
        localStorage.setItem("bulldozer-language", selectedLanguage);
      }
    }

    document.querySelectorAll(".language-button").forEach((button) => {
      button.addEventListener("click", () => {
        applyLanguage(button.dataset.language, true);
      });
    });

    document.getElementById("year").textContent = new Date().getFullYear();
    applyLanguage(detectLanguage());
  </script>
</body>
